[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache"

# Base (L2) targeted optimizations
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"

# Strict formatting matching our clean, readable style
[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"

[fuzz]
runs = 1000
seed = "0x4c415750" # Hex of "LAWP" using cast --from-ascii "LAWP"

[invariant]
runs = 256
depth = 100
fail_on_revert = true

[rpc_endpoints]
base = "${BASE_MAINNET_RPC}"
base_sepolia = "${BASE_SEPOLIA_RPC}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}" }
base_sepolia = { key = "${BASESCAN_API_KEY}" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
